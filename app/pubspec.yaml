name: app
description: "Accessibility-first Emergency App for Cambodia"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  http: ^1.2.1

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^14.0.0
  shared_preferences: ^2.5.3
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  cached_network_image: ^3.4.1
  flutter_staggered_animations: ^1.1.1
  confetti: ^0.7.0

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  country_flags: ^4.1.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/data/contacts.json
    - .env
